apiVersion: apps/v1
kind: Deployment
metadata:
  name: prompt-cache
  namespace: daystrom-ai
  labels:
    app: prompt-cache
    app.kubernetes.io/part-of: daystrom-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prompt-cache
  template:
    metadata:
      labels:
        app: prompt-cache
    spec:
      containers:
        - name: prompt-cache
          image: daystrom-ai/prompt-cache:latest
          ports:
            - containerPort: 50051
          envFrom:
            - configMapRef:
                name: app-config
            - configMapRef:
                name: otel-config
          env:
            - name: OTEL_SERVICE_NAME
              value: "prompt-cache"
            - name: GRPC_PORT
              value: "50051"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            exec:
              command: ["/bin/sh", "-c", "true"]
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: prompt-cache
  namespace: daystrom-ai
spec:
  selector:
    app: prompt-cache
  ports:
    - port: 50051
      targetPort: 50051
