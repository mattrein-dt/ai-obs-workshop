apiVersion: apps/v1
kind: Deployment
metadata:
  name: safety-gateway
  namespace: daystrom-ai
  labels:
    app: safety-gateway
    app.kubernetes.io/part-of: daystrom-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: safety-gateway
  template:
    metadata:
      labels:
        app: safety-gateway
    spec:
      containers:
        - name: safety-gateway
          image: daystrom-ai/safety-gateway:latest
          ports:
            - containerPort: 50053
            - containerPort: 9090
          envFrom:
            - configMapRef:
                name: app-config
            - configMapRef:
                name: otel-config
          env:
            - name: OTEL_SERVICE_NAME
              value: "safety-gateway"
            - name: SAFETY_MODEL_URL
              value: "http://mock-safety.daystrom-ai.svc.cluster.local:8000"
            - name: GRPC_PORT
              value: "50053"
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 500m
              memory: 384Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: safety-gateway
  namespace: daystrom-ai
spec:
  selector:
    app: safety-gateway
  ports:
    - name: grpc
      port: 50053
      targetPort: 50053
    - name: metrics
      port: 9090
      targetPort: 9090
