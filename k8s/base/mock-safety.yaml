# Mock safety model — returns "safe" for all requests.
# Lightweight stand-in for Llama-Guard (no GPU needed).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-safety
  namespace: daystrom-ai
  labels:
    app: mock-safety
    app.kubernetes.io/part-of: daystrom-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-safety
  template:
    metadata:
      labels:
        app: mock-safety
    spec:
      containers:
        - name: mock-safety
          image: daystrom-ai/mock-server:latest
          ports:
            - containerPort: 8000
          env:
            - name: PORT
              value: "8000"
            - name: MOCK_ROLE
              value: "safety-model"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mock-safety
  namespace: daystrom-ai
spec:
  selector:
    app: mock-safety
  ports:
    - port: 8000
      targetPort: 8000
