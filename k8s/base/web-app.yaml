apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  namespace: daystrom-mini
  labels:
    app: web-app
    app.kubernetes.io/part-of: daystrom-mini
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      containers:
        - name: web-app
          image: daystrom-mini/web-app:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: otel-config
          env:
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: OTEL_SERVICE_NAME
              value: "web-app"
            - name: API_URL
              value: "http://request-orchestrator.daystrom-mini.svc.cluster.local:8080"
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 500m
              memory: 384Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: web-app
  namespace: daystrom-mini
spec:
  type: NodePort
  selector:
    app: web-app
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30000
