apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-config
  namespace: daystrom-mini
data:
  OTEL_SERVICE_NAME: ""
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.daystrom-mini.svc.cluster.local:4317"
  OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
  OTEL_RESOURCE_ATTRIBUTES: "service.namespace=daystrom-mini,deployment.environment=codespace"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: daystrom-mini
data:
  REDIS_HOST: "redis.daystrom-mini.svc.cluster.local"
  REDIS_PORT: "6379"
  POSTGRES_HOST: "postgres.daystrom-mini.svc.cluster.local"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "daystrom"
  POSTGRES_USER: "daystrom"
  PROMPT_CACHE_ADDR: "prompt-cache.daystrom-mini.svc.cluster.local:50051"
  SAFETY_GATEWAY_ADDR: "safety-gateway.daystrom-mini.svc.cluster.local:50053"
  MODEL_ROUTER_ADDR: "model-router.daystrom-mini.svc.cluster.local:50052"
  INFERENCE_POOL_URL: "http://inference-pool.daystrom-mini.svc.cluster.local:8081"
  LLAMA_CPP_URL: "http://llama-cpp.daystrom-mini.svc.cluster.local:8080"
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: daystrom-mini
type: Opaque
stringData:
  POSTGRES_PASSWORD: "localdev"
