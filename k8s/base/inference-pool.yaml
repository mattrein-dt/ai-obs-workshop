apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-pool
  namespace: daystrom-mini
  labels:
    app: inference-pool
    app.kubernetes.io/part-of: daystrom-mini
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inference-pool
  template:
    metadata:
      labels:
        app: inference-pool
    spec:
      containers:
        - name: inference-pool
          image: daystrom-mini/inference-pool:latest
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: app-config
            - configMapRef:
                name: otel-config
          env:
            - name: OTEL_SERVICE_NAME
              value: "inference-pool"
            - name: PORT
              value: "8081"
            - name: VLLM_BASE_URL
              value: "http://llama-cpp.daystrom-mini.svc.cluster.local:8080"
            - name: POOL_NAME
              value: "pool-a-codespace"
            - name: POOL_TYPE
              value: "large"
            - name: CHIP_TYPE
              value: "cpu"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: inference-pool
  namespace: daystrom-mini
spec:
  selector:
    app: inference-pool
  ports:
    - port: 8081
      targetPort: 8081
