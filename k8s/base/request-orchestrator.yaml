apiVersion: apps/v1
kind: Deployment
metadata:
  name: request-orchestrator
  namespace: daystrom-ai
  labels:
    app: request-orchestrator
    app.kubernetes.io/part-of: daystrom-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: request-orchestrator
  template:
    metadata:
      labels:
        app: request-orchestrator
    spec:
      containers:
        - name: request-orchestrator
          image: daystrom-ai/request-orchestrator:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: app-config
            - configMapRef:
                name: otel-config
          env:
            - name: OTEL_SERVICE_NAME
              value: "request-orchestrator"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: request-orchestrator
  namespace: daystrom-ai
spec:
  selector:
    app: request-orchestrator
  ports:
    - port: 8080
      targetPort: 8080
