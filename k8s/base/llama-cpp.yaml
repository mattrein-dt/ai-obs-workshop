# llama.cpp server — runs a small quantized model on CPU.
# Provides OpenAI-compatible API at /v1/chat/completions.
# Model: Qwen2.5-0.5B-Instruct (Q4_K_M quantization, ~400MB)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llama-cpp
  namespace: daystrom-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llama-cpp
  template:
    metadata:
      labels:
        app: llama-cpp
    spec:
      initContainers:
        - name: download-model
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              if [ ! -f /models/model.gguf ]; then
                echo "Downloading Qwen2.5-0.5B-Instruct Q4_K_M..."
                curl -L -o /models/model.gguf \
                  "https://huggingface.co/Qwen/Qwen2.5-0.5B-Instruct-GGUF/resolve/main/qwen2.5-0.5b-instruct-q4_k_m.gguf"
                echo "Download complete."
              else
                echo "Model already exists, skipping download."
              fi
          volumeMounts:
            - name: model-storage
              mountPath: /models
      containers:
        - name: llama-cpp
          image: ghcr.io/ggerganov/llama.cpp:server
          args:
            - "--model"
            - "/models/model.gguf"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8080"
            - "--ctx-size"
            - "2048"
            - "--threads"
            - "2"
            - "--parallel"
            - "2"
            - "--chat-template"
            - "chatml"
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: model-storage
              mountPath: /models
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: model-storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: llama-cpp
  namespace: daystrom-ai
spec:
  selector:
    app: llama-cpp
  ports:
    - port: 8080
      targetPort: 8080
